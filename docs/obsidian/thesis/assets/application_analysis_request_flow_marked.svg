<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="820" viewBox="0 0 1360 820" role="img" aria-labelledby="title desc">
  <title id="title">Схема потока анализа заявки с пометками статуса компонентов</title>
  <desc id="desc">Потоковая диаграмма Reqcore и bi-encoder сервиса. Статус элементов кодируется цветом рамки по легенде SAT (см. подпись к рисунку).</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1f2933; }
      .hdr-title { font-size: 22px; font-weight: 700; }
      .hdr-sub { font-size: 13px; }
      .hdr-note { font-size: 12px; fill: #546e7a; }
      .box-title { font-size: 15px; font-weight: 700; }
      .box-text { font-size: 12px; }
      .box-code { font-size: 11px; fill: #455a64; }
      .branch { font-size: 13px; font-weight: 700; fill: #37474f; }
      .arrow { stroke: #263238; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .implemented { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 3; }
      .experimental { fill: #e0f2f1; stroke: #00695c; stroke-width: 3; }
      .approach { fill: #e3f2fd; stroke: #1565c0; stroke-width: 3; }
      .concept { fill: #f3e5f5; stroke: #6a1b9a; stroke-width: 3; stroke-dasharray: 4 4; }
      .assumption { fill: #fff8e1; stroke: #f57f17; stroke-width: 3; stroke-dasharray: 9 6; }
      .studied { fill: #f1f8e9; stroke: #558b2f; stroke-width: 3; }
      .legend-box { rx: 6; ry: 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="1360" height="820" fill="#ffffff"/>
  <rect x="24" y="16" width="1312" height="88" rx="12" fill="#f8fafc" stroke="#cfd8dc" stroke-width="1.5"/>
  <text x="44" y="46" class="hdr-title">Поток анализа заявки в Reqcore и bi-encoder сервисе</text>
  <text x="44" y="68" class="hdr-sub">Нотация SAT: статус элемента задаётся цветом рамки (см. легенду), а не отдельной строкой внутри блока.</text>
  <text x="44" y="88" class="hdr-note">Базовая нотация — потоковая схема (flowchart); надстройка SAT — авторская шкала достоверности утверждений о компонентах.</text>

  <!-- Row 1 -->
  <rect x="44" y="128" width="188" height="108" rx="14" class="implemented"/>
  <text x="64" y="156" class="box-title">Интерфейс Reqcore</text>
  <text x="64" y="176" class="box-code">(Reqcore UI)</text>
  <text x="64" y="198" class="box-text">Запрос анализа заявки</text>

  <rect x="268" y="128" width="268" height="108" rx="14" class="implemented"/>
  <text x="288" y="156" class="box-title">Точка анализа заявки</text>
  <text x="288" y="176" class="box-code">(/api/applications/:id/analyze)</text>
  <text x="288" y="198" class="box-text">Выбор ветки скоринга</text>

  <polygon points="628,128 718,178 628,228 538,178" class="approach"/>
  <text x="552" y="168" class="box-title">Провайдер</text>
  <text x="552" y="186" class="box-code">(provider = biencoder?)</text>
  <rect x="538" y="236" width="180" height="26" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="552" y="254" class="box-code" font-weight="700" fill="#1565c0">Архитектурный подход</text>

  <text x="748" y="162" class="branch">да</text>
  <rect x="792" y="118" width="248" height="118" rx="14" class="implemented"/>
  <text x="812" y="146" class="box-title">Вызов bi-encoder сервиса</text>
  <text x="812" y="166" class="box-code">URL (BIENCODER_URL)</text>
  <text x="812" y="184" class="box-code">маршрут (/score)</text>
  <text x="812" y="204" class="box-text">HTTP POST, Python API</text>

  <rect x="1088" y="118" width="228" height="118" rx="14" class="implemented"/>
  <text x="1108" y="146" class="box-title">Сервис FastAPI</text>
  <text x="1108" y="168" class="box-code">(11_api_server.py)</text>
  <text x="1108" y="190" class="box-text">Загрузка ранжировщика</text>

  <line x1="232" y1="182" x2="268" y2="182" class="arrow"/>
  <line x1="536" y1="182" x2="538" y2="182" class="arrow"/>
  <line x1="718" y1="168" x2="792" y2="168" class="arrow"/>
  <line x1="1040" y1="177" x2="1088" y2="177" class="arrow"/>

  <!-- Row 2 bi-encoder branch -->
  <rect x="792" y="278" width="248" height="100" rx="14" class="experimental"/>
  <text x="812" y="306" class="box-title">Ранжировщик</text>
  <text x="812" y="326" class="box-code">(ATSRanker)</text>
  <text x="812" y="346" class="box-text">Косинусное сходство, top-k</text>

  <rect x="1088" y="278" width="228" height="100" rx="14" class="implemented"/>
  <text x="1108" y="306" class="box-title">Оценка заявки</text>
  <text x="1108" y="326" class="box-code">(application.score)</text>
  <text x="1108" y="346" class="box-code">аудит (analysis_run)</text>

  <line x1="1202" y1="236" x2="1202" y2="278" class="arrow"/>
  <line x1="1040" y1="328" x2="1088" y2="328" class="arrow"/>

  <!-- Row 2 LLM branch -->
  <text x="500" y="318" class="branch">нет</text>
  <rect x="268" y="298" width="248" height="100" rx="14" class="implemented"/>
  <text x="288" y="326" class="box-title">Скоринг заявки</text>
  <text x="288" y="346" class="box-code">(scoreApplication())</text>
  <text x="288" y="366" class="box-text">Критериальный LLM scoring</text>

  <rect x="44" y="298" width="188" height="100" rx="14" class="implemented"/>
  <text x="64" y="326" class="box-title">Провайдер LLM</text>
  <text x="64" y="348" class="box-text">OpenAI / Anthropic / Google</text>

  <line x1="583" y1="210" x2="520" y2="310" class="arrow"/>
  <line x1="268" y1="348" x2="232" y2="348" class="arrow"/>

  <!-- Row 3 -->
  <rect x="268" y="438" width="288" height="108" rx="14" class="implemented"/>
  <text x="288" y="466" class="box-title">Запись LLM-результата</text>
  <text x="288" y="486" class="box-code">(criterion_score)</text>
  <text x="288" y="504" class="box-code">(application.score)</text>
  <text x="288" y="524" class="box-text">Итог по критериям и заявке</text>

  <rect x="792" y="438" width="288" height="96" rx="14" class="concept"/>
  <text x="812" y="466" class="box-title">Ветка «только score»</text>
  <text x="812" y="486" class="box-code">(bi-encoder)</text>
  <text x="812" y="508" class="box-text">Не заменяет объяснимость</text>
  <text x="812" y="526" class="box-text">по критериям</text>

  <line x1="136" y1="348" x2="288" y2="470" class="arrow"/>
  <line x1="1202" y1="378" x2="1060" y2="460" class="arrow"/>

  <!-- Legend -->
  <rect x="24" y="580" width="1312" height="210" rx="16" fill="#fafafa" stroke="#cfd8dc" stroke-width="2"/>
  <text x="44" y="612" class="box-title">Легенда SAT (Status Assertion Taxonomy) — единая шкала для всех диаграмм работы</text>
  <text x="44" y="634" class="hdr-note">C4 Container и BPMN используют ту же цветовую схему; BPMN 2.0 описывает процесс, SAT — эпистемический статус элемента.</text>
  <rect x="44" y="652" width="20" height="20" class="assumption legend-box"/><text x="72" y="667" class="box-text">Архитектурное допущение — проектное предположение без проверки в работе</text>
  <rect x="44" y="682" width="20" height="20" class="approach legend-box"/><text x="72" y="697" class="box-text">Архитектурный подход — выбранная проектная схема интеграции</text>
  <rect x="44" y="712" width="20" height="20" class="concept legend-box"/><text x="72" y="727" class="box-text">Концептуальный компонент — требование/рамка без эмпирической проверки</text>
  <rect x="700" y="652" width="20" height="20" class="studied legend-box"/><text x="728" y="667" class="box-text">Исследовано — подготовка данных и артефакты, изученные автором</text>
  <rect x="700" y="682" width="20" height="20" class="implemented legend-box"/><text x="728" y="697" class="box-text">Реализовано — присутствует в коде прототипа</text>
  <rect x="700" y="712" width="20" height="20" class="experimental legend-box"/><text x="728" y="727" class="box-text">Экспериментально проверено — измерено на val/test или E2E</text>
  <text x="44" y="768" class="hdr-note">Зелёная рамка = реализовано; бирюзовая = эксперимент; синяя заливка у ромба = архитектурный выбор ветки.</text>
</svg>
